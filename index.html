<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ai私域 - Apple Style Design</title>
  <style>
    :root {
      --bg-1: #f5f7ff;
      --bg-2: #eef3ff;
      --bg-3: #f9fbff;
      --glass: rgba(255, 255, 255, 0.62);
      --glass-strong: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.58);
      --line-soft: rgba(215, 222, 238, 0.9);
      --text: #101623;
      --muted: #6e768c;
      --muted-2: #8f97ab;
      --brand: #387bff;
      --brand-2: #72a6ff;
      --brand-3: #86e2ff;
      --violet: #7b61ff;
      --teal: #70d6ff;
      --pink: #ff92c2;
      --success: #15a06a;
      --warning: #f08b38;
      --offline: #97a1b8;
      --shadow-xl: 0 28px 80px rgba(34, 56, 110, 0.18);
      --shadow-lg: 0 18px 40px rgba(49, 78, 149, 0.12);
      --shadow-md: 0 10px 24px rgba(55, 78, 122, 0.1);
      --radius-2xl: 36px;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, rgba(114, 166, 255, 0.38), transparent 22%),
        radial-gradient(circle at 88% 18%, rgba(255, 146, 194, 0.22), transparent 20%),
        radial-gradient(circle at 80% 75%, rgba(134, 226, 255, 0.32), transparent 22%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 38%, var(--bg-3) 100%);
    }
    .frame {
      width: min(1480px, calc(100vw - 36px));
      min-height: calc(100vh - 36px);
      margin: 18px auto;
      padding: 18px;
      border-radius: 40px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.26));
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(26px);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      padding: 8px 10px 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.9), transparent 30%),
        linear-gradient(135deg, #70d6ff 0%, #4d8fff 45%, #7b61ff 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.75),
        0 10px 22px rgba(72, 117, 218, 0.28);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 12px;
